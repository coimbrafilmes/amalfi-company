# Bottega · by Amalfi & Co. — Netlify config
# Ref: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "packages/bottega"
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline --no-audit --progress=false"

# Functions: TypeScript native via esbuild (default em Netlify Functions v2)
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@google/genai"]

# SPA routing — qualquer rota não encontrada cai no index (React Router resolve)
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache estático longo pra assets versionados
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Functions: sem cache + CORS restrito ao próprio domínio
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
